name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

          go build -ldflags "-X github.com/House-lovers7/edge-checker/internal/version.Version=${VERSION} -X github.com/House-lovers7/edge-checker/internal/version.Commit=${COMMIT} -X github.com/House-lovers7/edge-checker/internal/version.Date=${DATE}" \
            -o "edge-checker-${GOOS}-${GOARCH}${EXT}" ./cmd/edge-checker

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edge-checker-${{ matrix.goos }}-${{ matrix.goarch }}
          path: edge-checker-*

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/edge-checker-*
